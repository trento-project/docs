name: Reusable build Trento documentation site

on:
  workflow_call:
    inputs:
      upload-pages-artifact:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Configure Pages
        if: inputs.upload-pages-artifact
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            trento-docs-site/package-lock.json
            trento-docs-site-ui/package-lock.json
      - name: Install site dependencies
        working-directory: trento-docs-site
        run: npm ci
      - name: Check site formatting
        working-directory: trento-docs-site
        run: npm run format:check
      - name: Run extension tests
        working-directory: trento-docs-site
        run: npm test
      - name: Install UI dependencies
        working-directory: trento-docs-site-ui
        run: npm ci
      - name: Build UI bundle
        working-directory: trento-docs-site-ui
        run: npx gulp bundle
      - name: Generate Site
        working-directory: trento-docs-site
        run: npx antora antora-playbook.yml
      - name: Upload Artifacts
        if: inputs.upload-pages-artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: trento-docs-site/build/trento-docs-site-public
