version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
  - package-ecosystem: "npm"
    directory: "/trento-docs-site"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
  - package-ecosystem: "npm"
    directory: "/trento-docs-site-ui"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
