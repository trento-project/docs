name: docs
title: Trento
version: ~
nav:
- modules/trento_documentation/nav.adoc
- modules/components/nav.adoc
- modules/api/nav.adoc
- modules/developer/nav.adoc

ext:
  collector:
    - clean:
        dir: modules/trento_documentation/pages
    - clean:
        dir: modules/trento_documentation/images
    - scan:
        dir: trento/adoc
        files: '**/*.adoc'
        into: modules/trento_documentation/pages
    - scan:
        dir: trento/images/src/png
        files: '**/*.png'
        into: modules/trento_documentation/images
    - run:
        command: ./scripts/generate-attributes-yaml.sh trento/adoc/generic-attributes.adoc ./antora_tmp/antora.yml
    - scan:
        dir: antora_tmp
        files: 'antora.yml'
    - clean:
        dir: antora_tmp

# Trento upstream projects components
    - clean:
        dir: modules/components/pages
    - clean:
        dir: modules/components/images
    - scan:
        dir:  components/
        files: '**/*.adoc'
        into: modules/components/pages
    - scan:
        dir: components/assets
        files: '**/*.{png,jpg,jpeg,svg,gif}'
        into: modules/components/images
# Trento developer documentation
    - clean:
        dir: modules/developer/pages
    - scan:
        dir: developer/
        files: '**/*.adoc'
        into: modules/developer/pages
# Images developer documentation
    - clean:
        dir: modules/developer/images
    - scan:
        dir: developer/assets
        files: '**/*.{png,jpg,jpeg,svg,gif}'
        into: modules/developer/images


